name: Build and test the extension

on:
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      # 1 – Check out the code
      - uses: actions/checkout@v5

      # 2 – Expose the version tag as $PACKAGE_VERSION (only if this is a v* tag ref)
      - name: Set environment package version from tag
        shell: bash
        run: |
          ref="${GITHUB_REF#refs/*/}"
          if [[ "$ref" == v* ]]; then
            echo "PACKAGE_VERSION=${ref#v}" >> "$GITHUB_ENV"
          else
            echo "PACKAGE_VERSION=" >> "$GITHUB_ENV"
          fi

      # 3 – Set up Python
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      # 4 – Set up Node.js
      - uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: 'npm'

      # 5 – Set up JDK 17 and enable sbt cache
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'

      # 6 – Install sbt 1.12.4
      - name: Set up sbt
        uses: sbt/setup-sbt@v1
        with:
          sbt-runner-version: '1.12.4'

      # 7 – Install Python build / publish deps
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip build twine

      # 8 – Build the wheel
      - name: Build wheel
        run: python -m build

      # 9 – Install the package
      - name: Install the package
        run: pip install .

      # 10 – Install pytest
      - name: Install pytest
        run: pip install pytest

      # 11 – Run tests
      - name: Run tests
        run: pytest
