name: Publish To PyPI

on:
  push:
    tags:
      - 'v*'  # runs only when you push tags like v1.2.3

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}  # Deny all permissions by default at workflow level

jobs:
  build-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Trusted Publishing to PyPI (OIDC)
      contents: read

    steps:
      # 1 – Check out the repo
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # 2 – Expose the tag (e.g. 1.2.3) as $PACKAGE_VERSION
      - name: Set environment package version from tag
        shell: bash
        run: |
          ref="${GITHUB_REF#refs/*/}"
          echo "PACKAGE_VERSION=${ref#v}" >> "$GITHUB_ENV"

      # 3 – Set up Python
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'

      # 4 – Set up Node.js
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.x'
          cache: 'npm'

      # 5 – Set up JDK 17 and enable sbt cache
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'

      # 6 – Install sbt 1.12.4
      - name: Set up sbt
        uses: sbt/setup-sbt@508b753e53cb6095967669e0911487d2b9bc9f41 # v1.1.22
        with:
          sbt-runner-version: '1.12.4'

      # 7 – Install Python build deps
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip build

      # 8 – Build the wheel/sdist
      - name: Build distribution
        run: python -m build

      # 9 – Publish to PyPI (Trusted Publishing)
      - name: Publish distribution to PyPI 🚀
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
