name: Publish To PyPI

on:
  push:
    tags:
      - 'v*'  # runs only when you push tags like v1.2.3

jobs:
  build-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Trusted Publishing to PyPI (OIDC)
      contents: read

    steps:
      # 1 – Check out the repo
      - uses: actions/checkout@v5

      # 2 – Expose the tag (e.g. 1.2.3) as $PACKAGE_VERSION
      - name: Set environment package version from tag
        shell: bash
        run: |
          ref="${GITHUB_REF#refs/*/}"
          echo "PACKAGE_VERSION=${ref#v}" >> "$GITHUB_ENV"

      # 3 – Set up Python
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      # 4 – Set up Node.js
      - uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: 'npm'

      # 5 – Set up JDK 17 and enable sbt cache
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'

      # 6 – Install sbt 1.12.4
      - name: Set up sbt
        uses: sbt/setup-sbt@v1
        with:
          sbt-runner-version: '1.12.4'

      # 7 – Install Python build deps
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip build

      # 8 – Build the wheel/sdist
      - name: Build distribution
        run: python -m build

      # 9 – Publish to PyPI (Trusted Publishing)
      - name: Publish distribution to PyPI 🚀
        uses: pypa/gh-action-pypi-publish@release/v1
