name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Release bump: major, minor or patch"
        required: true
        default: "patch"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}  # Deny all permissions by default at workflow level

jobs:
  bump-version:
    runs-on: ubuntu-latest
    environment: tag-release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
      - name: Install release tooling
        run: python -m pip install bump2version
      - name: Bump and tag
        run: |
          git config --local user.email "swan-admins@cern.ch"
          git config --local user.name "swan-admins[bot]"
          bump2version ${{ github.event.inputs.bump }}
      - name: Push changes
        uses: ad-m/github-push-action@4cc74773234f74829a8c21bc4d69dd4be9cfa599 # v1.1.0
        with:
          github_token: ${{ secrets.WORKFLOW_ACCESS_TOKEN }}
          tags: true
